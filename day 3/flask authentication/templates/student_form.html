{% extends 'base.html' %}
{% block title %}{{ title }} | ParvaM Auth{% endblock %}
{% block content %}
  <div class="text-center mb-4">
    <h2 class="fw-bold">{{ title }}</h2>
    <p class="text-muted">Use the form below to save student information.</p>
  </div>
  <form method="POST" novalidate>
    <div class="mb-3">
      <label class="form-label text-dark">Student Name</label>
      <input type="text" name="name" class="form-control form-control-lg" value="{{ form.name }}" placeholder="Jane Doe" required>
    </div>
    <div class="mb-3">
      <label class="form-label text-dark">Email address</label>
      <input type="email" name="email" class="form-control form-control-lg" value="{{ form.email }}" placeholder="jane@student.com" required>
    </div>
    <div class="mb-3">
      <label class="form-label text-dark">Age</label>
      <input type="number" min="1" max="120" name="age" class="form-control form-control-lg" value="{{ form.age }}" placeholder="21" required>
    </div>
    <div class="mb-4">
      <label class="form-label text-dark">Course</label>
      <input type="text" name="course" class="form-control form-control-lg" value="{{ form.course }}" placeholder="Computer Science" required>
    </div>
    <button type="submit" class="btn btn-primary btn-lg w-100 mb-3">{{ submit_label }}</button>
    <a href="{{ url_for('students') }}" class="btn btn-outline-secondary btn-lg w-100">Cancel</a>
  </form>
{% endblock %}
